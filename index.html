<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Image Gallery Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="center">
        <input type="radio" checked name="active" id="tab-1">
        <input type="radio" name="active" id="tab-2">
        <input type="radio" name="active" id="tab-3">
        <input type="radio" name="active" id="tab-4">
        <div class="sliders">
            <label for="tab-1"><img src="" ><img src="img1.jpg"></label>
            <label for="tab-2"><img src="" ><img src="img4.jpg"></label>
            <label for="tab-3"><img src="" ><img src="img3.jpg"></label>
            <label for="tab-4"><img src="" ><img src="img2.jpg"></label>
        </div>
        <div class="img-card">
            <img src="img1.jpg">
            <img src="img2.jpg">
            <img src="img3.jpg">
            <img src="img4.jpg">
        </div>        
    </div>
</body>
</html>
